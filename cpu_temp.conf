# cpu_temp.conf — sensor hints for cpu_temp
#
# Keys use dot-separated CPU slug prefixes (most specific match wins).
# Values: driver:label  where driver is the hwmon driver name (k10temp,
#         coretemp) or the special token "thermal_zone" for sysfs thermal zones.
#
# The lookup walks the CPU slug tokens from longest prefix to shortest,
# then falls back to "default.sensor" if nothing matches.
#
# When cpu_temp is run with --config-primary this file is consulted first;
# otherwise it is used only when the built-in auto-detection fails.
#
# Uncomment / extend as needed after experimenting with ./cpu_temp --verbose.

# ── fallback ──────────────────────────────────────────────────────────────────
default.sensor = thermal_zone:acpitz

# ── Intel ─────────────────────────────────────────────────────────────────────
intel.sensor   = thermal_zone:x86_pkg_temp

# Intel N-series (N95, N100, N150, N200 …)
intel.n.sensor = thermal_zone:x86_pkg_temp

# ── AMD ───────────────────────────────────────────────────────────────────────
amd.sensor        = k10temp:Tctl

# AMD Ryzen (all sub-families)
amd.ryzen.sensor  = k10temp:Tctl

# AMD Ryzen 5 (e.g. 7430U)
amd.ryzen.5.sensor = k10temp:Tctl

# AMD Ryzen 7
amd.ryzen.7.sensor = k10temp:Tctl

# AMD Ryzen 9
amd.ryzen.9.sensor = k10temp:Tctl
