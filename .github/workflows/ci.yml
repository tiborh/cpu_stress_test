name: Build and Test

on:
  push:
    branches: [main]
    paths:
      - '*.c'
      - '*.h'
      - '*.conf'
      - 'Makefile'
      - 'check_build_deps.sh'
      - 'results/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '*.c'
      - '*.h'
      - '*.conf'
      - 'Makefile'
      - 'check_build_deps.sh'
      - 'results/**'
      - '.github/workflows/ci.yml'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        cc: [gcc, clang]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gnuplot
          if [ "${{ matrix.cc }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi

      - name: Build
        run: make CC=${{ matrix.cc }}

      - name: Smoke tests
        run: make check

      - name: Verify dependency checker
        run: ./check_build_deps.sh --build

      - name: Verify gnuplot integration
        run: make plot
